<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中国 AI 司法实践案例图 · China AI Legal Case Map</title>
  <meta name="description" content="A curated atlas of AI-related cases adjudicated by Chinese courts.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="styles.css">

  <script src="d3.min.js"></script>
</head>
<body>

<!-- ============== 顶部导航 ============== -->
<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-mark">
      金杜律师事务所<span class="en">King &amp; Wood</span>
    </div>
  </div>
  <div class="topbar-right">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </div>
</header>

<!-- ============== 主体 ============== -->
<div class="page">

  <!-- Hero -->
  <section class="hero">
    <div class="eyebrow" data-i18n="eyebrow">宋海燕团队 · 数字经济与人工智能</div>
    <h1>
      <span data-i18n="siteTitle">中国 AI 司法实践案例图</span>
    </h1>
    <div class="subtitle" data-i18n="siteSubtitle">China AI Legal Case Map</div>
    <div class="hero-divider"></div>
    <p class="lede" data-i18n="lede">汇集全国各级法院涉人工智能案件，按管辖法院分布及争议焦点分类。点击省份探索该地实践，进而查看具体法院的案件。</p>
  </section>

  <!-- 统计 -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-cases">—</div>
      <div class="stat-label" data-i18n="statCases">案件</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-courts">—</div>
      <div class="stat-label" data-i18n="statCourts">管辖法院</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-issues">7</div>
      <div class="stat-label" data-i18n="statIssues">争议焦点</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-team">—</div>
      <div class="stat-label" data-i18n="statTeam">团队评注</div>
    </div>
  </div>

  <!-- 筛选条 -->
  <div class="filters">
    <div class="filter-group">
      <span class="filter-label" data-i18n="filterYear">年份</span>
      <div class="filter-chips" id="filter-year-chips"></div>
    </div>

    <div class="filter-group">
      <span class="filter-label" data-i18n="filterIssue">争议焦点</span>
      <div class="filter-chips" id="filter-issue-chips"></div>
    </div>

    <div class="filter-group">
      <span class="filter-label" data-i18n="filterTech">AI 技术</span>
      <div class="filter-chips" id="filter-tech-chips"></div>
    </div>

    <div class="filter-group">
      <button class="chip gold" id="filter-team-toggle" data-i18n="filterTeamOnly">仅看团队评注</button>
    </div>

    <input
      type="text"
      class="search-input"
      id="search-input"
      placeholder="搜索案件名 / 案号 / 城市…"
      data-i18n-placeholder="searchPlaceholder"
    />

    <button class="reset-btn" id="reset-btn" data-i18n="resetFilters">清空筛选</button>
  </div>

  <!-- 主视图 -->
  <div class="viewport view-overview" id="viewport">

    <!-- 地图 -->
    <section class="map-section">
      <div class="map-wrapper">
        <svg id="china-map" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="map-tooltip" id="map-tooltip"></div>
      </div>
      <div class="map-hint" id="map-hint" data-i18n="mapHint">点击有案件的省份开始探索</div>
      <div class="map-legend">
        <span><span class="legend-swatch" style="background: var(--map-empty);"></span><span data-i18n="legendEmpty">暂无案件</span></span>
        <span><span class="legend-swatch" style="background: var(--map-default);"></span><span data-i18n="legendActive">有案件</span></span>
        <span><span class="legend-swatch" style="background: var(--map-active);"></span><span data-i18n="legendSelected">已选中</span></span>
      </div>
    </section>

    <!-- 右侧 panel -->
    <section class="panel-section" id="panel-section">
      <!-- 由 JS 渲染 -->
    </section>

  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <p class="footer-text" data-i18n="footerNote">数据来源于公开判决、新闻报道及团队整理。本图供研究与学习用途，非正式法律意见。</p>
    <div class="footer-credit">
      <span data-i18n="footerCredit">© 宋海燕 2026 · 金杜律师事务所</span><br>
      <span data-i18n="footerUpdate">案例更新至 2026 年 4 月</span>
    </div>
  </footer>

</div>

<!-- 案件详情弹窗 -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="china-geo.js"></script>
<script src="i18n.js"></script>
<script src="cases.js"></script>
<script src="app.js"></script>

</body>
</html>
